name: diag-clickverify

# Temporary read-only verification: confirm the nginx real_ip fix — recent clicks should now
# record the real visitor IP (is_bot=0, bot_name NOT 'datacenter:Cloudflare'). Remove after use.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: SSH read-only verification
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            set +e
            cd ~/short-link/deploy
            echo "===== latest 12 hPIoNau clicks (no time filter): clicked_at / is_bot / bot_name / asn / asn_org / country ====="
            docker compose exec -T mysql sh -c 'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" "${MYSQL_DATABASE:-short_link}" -e "SELECT c.clicked_at, c.is_bot, c.bot_name, c.asn, c.asn_org, c.country_code FROM click_event c JOIN link l ON l.id=c.link_id WHERE l.short_code='\''hPIoNau'\'' ORDER BY c.id DESC LIMIT 12;"' 2>&1 | tail -c 4000
            echo "===== mysql NOW() vs UTC_TIMESTAMP() (timezone sanity) ====="
            docker compose exec -T mysql sh -c 'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -N -e "SELECT NOW(), UTC_TIMESTAMP();"' 2>&1 | tail -c 400
            echo "===== done ====="
