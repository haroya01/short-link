# 임시 운영 잡 — honggildong(user 1) 글의 첫 IMAGE 블록 URL 을 og_image_url 로 백필.
# Qiita 일괄 이관분(커버 없음)에 피드 썸네일을 깔기 위한 1회성. 실행 후 이 파일은 제거한다
# (prod 접근 관례: workflow_dispatch + PR + 사용 후 삭제).
name: ops-backfill-og-images

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true = 실제 UPDATE, false = 대상 미리보기(SELECT만)"
        required: true
        default: "false"

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Backfill first-image covers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/short-link/deploy
            # 대상: user 1 의 발행/보유 글 중 커버가 없고 IMAGE 블록이 있는 것.
            # 첫 IMAGE 블록(content JSON)의 $.url 을 커버로. 512자 초과는 건너뜀(컬럼 캡).
            PREVIEW_SQL="
              SELECT p.id, p.slug,
                     JSON_UNQUOTE(JSON_EXTRACT(fb.content, '\$.url')) AS first_url
              FROM posts p
              JOIN post_block fb ON fb.id = (
                SELECT pb.id FROM post_block pb
                WHERE pb.post_id = p.id AND pb.block_type = 'IMAGE'
                ORDER BY pb.block_order ASC LIMIT 1)
              WHERE p.user_id = 1 AND p.og_image_url IS NULL
                AND CHAR_LENGTH(JSON_UNQUOTE(JSON_EXTRACT(fb.content, '\$.url'))) <= 512;"
            APPLY_SQL="
              UPDATE posts p
              JOIN post_block fb ON fb.id = (
                SELECT pb.id FROM post_block pb
                WHERE pb.post_id = p.id AND pb.block_type = 'IMAGE'
                ORDER BY pb.block_order ASC LIMIT 1)
              SET p.og_image_url = JSON_UNQUOTE(JSON_EXTRACT(fb.content, '\$.url'))
              WHERE p.user_id = 1 AND p.og_image_url IS NULL
                AND CHAR_LENGTH(JSON_UNQUOTE(JSON_EXTRACT(fb.content, '\$.url'))) <= 512;
              SELECT ROW_COUNT() AS updated;"
            if [ "${{ inputs.apply }}" = "true" ]; then SQL="$APPLY_SQL"; else SQL="$PREVIEW_SQL"; fi
            printf '%s' "$SQL" | docker compose exec -T mysql sh -c \
              'exec mysql -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE"'
