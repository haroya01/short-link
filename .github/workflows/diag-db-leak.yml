name: Diag DB pool leak (temp, read-only)

# 임시·읽기전용 진단. EC2 app 컨테이너 로그에서 Hikari leak 스택과
# /stream async 에러 스택을 떠서, 어떤 호출이 커넥션을 오래 쥐는지 획득 지점을 특정한다.
# docker compose logs 만 읽고 아무것도 바꾸지 않는다. 확인 후 이 파일은 제거한다.

on:
  workflow_dispatch:
    inputs:
      since:
        description: "how far back to read app logs"
        default: "3h"
      tail:
        description: "max log lines to scan"
        default: "20000"

permissions:
  contents: read

jobs:
  read-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Pull leak + async stacks from EC2 app logs
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SINCE,TAIL
          script_stop: false
          script: |
            cd ~/short-link/deploy
            LOG=$(mktemp)
            docker compose logs app --since "${SINCE}" --tail "${TAIL}" --no-color > "$LOG" 2>&1 || true

            echo "================ LEAK WARN COUNT ================"
            grep -c "Apparent connection leak detected" "$LOG" || true
            echo

            echo "================ FIRST LEAK STACK (acquisition site) ================"
            grep -m1 -A 45 "Apparent connection leak detected" "$LOG" || echo "(none found)"
            echo

            echo "================ LAST LEAK STACK ================"
            grep -A 45 "Apparent connection leak detected" "$LOG" | tail -90 || echo "(none found)"
            echo

            echo "================ DISTINCT THREADS THAT LEAKED ================"
            grep "Connection leak detection triggered" "$LOG" | grep -oE "on thread [^,]+" | sort | uniq -c || true
            echo

            echo "================ AsyncRequestNotUsable STACK (first) ================"
            grep -m1 -A 30 "AsyncRequestNotUsableException" "$LOG" || echo "(none found)"
            echo

            echo "================ /stream unexpected-error lines ================"
            grep "unexpected error: GET" "$LOG" | grep "/stream" | tail -10 || echo "(none found)"
            echo

            echo "================ HikariPool stats lines (if any) ================"
            grep -iE "HikariPool.*(stats|Pool stats|Timeout failure|connection is not available)" "$LOG" | tail -20 || echo "(none found)"
        env:
          SINCE: ${{ github.event.inputs.since }}
          TAIL: ${{ github.event.inputs.tail }}
