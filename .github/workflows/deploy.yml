name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: kurl-prod-app
  ECS_CLUSTER: kurl-prod-cluster
  ECS_SERVICE: kurl-prod-app
  ECS_TASK_FAMILY: kurl-prod-app
  CONTAINER_NAME: app

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render task definition
        id: render
        run: |
          aws ecs describe-task-definition --task-definition "$ECS_TASK_FAMILY" \
            --query taskDefinition > task-def.json
          jq --arg IMAGE "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" '
            {
              family,
              networkMode,
              executionRoleArn,
              taskRoleArn,
              cpu,
              memory,
              requiresCompatibilities,
              runtimePlatform,
              containerDefinitions: (
                .containerDefinitions
                | map(if .name == "app" then .image = $IMAGE else . end)
              )
            }
          ' task-def.json > task-def-new.json
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json file://task-def-new.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.render.outputs.task_def_arn }}" \
            --force-new-deployment > /dev/null

      - name: Wait for service stable
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
