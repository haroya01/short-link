name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle"
      - "Dockerfile"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          build-args: |
            MAXMIND_LICENSE_KEY=${{ secrets.MAXMIND_LICENSE_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN
          script_stop: true
          script: |
            set -e
            cd ~/short-link
            git pull --ff-only
            cd deploy
            # GHCR package is private; auth before pull, then drop the token from the EC2's
            # docker config so the credential isn't sitting on disk after we're done.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u haroya01 --password-stdin
            docker compose pull app
            docker compose up -d --no-build --pull never
            # Now safe to drop the credential — no more pulls until next deploy.
            docker logout ghcr.io
            # Cleanup stale images so disk doesn't fill up over time.
            docker image prune -f
            docker compose ps
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_RO_TOKEN }}
