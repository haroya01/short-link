name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle"
      - "Dockerfile"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          provenance: false
          build-args: |
            MAXMIND_LICENSE_KEY=${{ secrets.MAXMIND_LICENSE_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN
          script_stop: true
          script: |
            set -e
            cd ~/short-link
            # pull --ff-only 는 서버 체크아웃이 한 번이라도 diverge 하면(과거 수동 커밋·force-push
            # 잔재) 영구히 실패한다 — 배포 박스의 워킹트리는 어차피 origin/main 의 사본이어야 하므로
            # 원격 상태로 강제 동기화한다. reset --hard 는 tracked 파일만 만지므로 서버의 .env 등
            # untracked 설정은 그대로다.
            git fetch origin main
            git reset --hard origin/main
            cd deploy
            # GHCR package is private; auth before pull, then drop the token from the EC2's
            # docker config so the credential isn't sitting on disk after we're done.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u haroya01 --password-stdin
            docker compose pull app
            docker compose up -d --no-build --pull never
            # Now safe to drop the credential — no more pulls until next deploy.
            docker logout ghcr.io
            # Cleanup stale images so disk doesn't fill up over time.
            docker image prune -f
            # Wait for the app container to report healthy before the workflow declares
            # success. Without this the Discord notify below would fire green even on a
            # crash-looping container — the v1/v2 Sentry-starter outage was invisible to
            # CI for that exact reason.
            for i in $(seq 1 30); do
              if docker compose ps app --format '{{.Status}}' | grep -q healthy; then
                echo "app healthy after ${i} attempts"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "app failed to become healthy"
                docker compose logs app --tail 50
                exit 1
              fi
              sleep 4
            done
            # nginx caches the app container's IP at worker boot. When `compose up -d`
            # recreates the app container its IP can shift inside the compose network,
            # and nginx will keep proxying the stale IP — every /api, /oauth2 call
            # returns 502 until reload. Reload is graceful and re-resolves upstream
            # without dropping in-flight requests. Caught after the 12-day stale-IP
            # outage where nginx had been up far longer than the app it was fronting.
            docker compose exec -T nginx nginx -s reload
            docker compose ps
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_RO_TOKEN }}

      - name: Notify Discord — deploy success
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          MSG=$(jq -nc \
            --arg sha "${GITHUB_SHA:0:7}" \
            --arg msg "$(git log -1 --pretty=%s)" \
            --arg run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{ content: "✅ **BE deploy success** · \($sha) — \($msg)\n<\($run)>" }')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$MSG" "$WEBHOOK"

      - name: Notify Discord — deploy failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        run: |
          MSG=$(jq -nc \
            --arg sha "${GITHUB_SHA:0:7}" \
            --arg msg "$(git log -1 --pretty=%s)" \
            --arg run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{ content: "🚨 **BE deploy FAILED** · \($sha) — \($msg)\n<\($run)>" }')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$MSG" "$WEBHOOK" || true
