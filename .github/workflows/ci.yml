name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Start backing services
        run: docker compose -f resources/docker-compose.yml up -d

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if docker exec short-link-mysql mysqladmin ping -h localhost -u short_link -pharoya0117! --silent 2>/dev/null; then
              echo "MySQL ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL failed to start"
          docker compose -f resources/docker-compose.yml logs
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if docker exec short-link-redis redis-cli -a haroya0117! ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready"
              exit 0
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 2
          done
          echo "Redis failed to start"
          docker compose -f resources/docker-compose.yml logs
          exit 1

      - run: ./gradlew spotlessCheck

      - name: Download GeoLite2 database
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: ./gradlew downloadGeoLite2

      - run: ./gradlew test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false

      - run: ./gradlew build -x test -x spotlessCheck

      - name: Stop backing services
        if: always()
        run: docker compose -f resources/docker-compose.yml down -v
