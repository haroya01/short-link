name: diag-prod-errors

# Temporary READ-ONLY diagnostics for the "lots of server errors" report.
# Dumps app-container exceptions/stacktraces, an exception-type histogram, nginx 5xx
# (which endpoints are failing), and container restart counts (crash-loop detection).
# No writes. Remove after use.
on:
  workflow_dispatch:
    inputs:
      since:
        description: "log window (e.g. 3h, 12h, 24h)"
        required: false
        default: "12h"

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH read-only error diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          command_timeout: 10m
          envs: SINCE
          script: |
            set +e
            WIN="${SINCE:-12h}"
            cd ~/short-link/deploy

            echo "===== container status (restart counts → crash loop) ====="
            docker compose ps
            for c in app nginx mysql redis; do
              id=$(docker compose ps -q "$c" 2>/dev/null)
              [ -n "$id" ] && printf "%-6s restarts=%s started=%s\n" "$c" \
                "$(docker inspect -f '{{.RestartCount}}' "$id")" \
                "$(docker inspect -f '{{.State.StartedAt}}' "$id")"
            done

            echo
            echo "===== app: ERROR/Exception line count (last $WIN) ====="
            docker compose logs app --since "$WIN" 2>&1 | grep -cE "ERROR|Exception|WARN"

            echo
            echo "===== app: exception-type histogram (last $WIN, top 30) ====="
            docker compose logs app --since "$WIN" 2>&1 \
              | grep -oE "[A-Za-z0-9_.]+(Exception|Error)\b" | sort | uniq -c | sort -rn | head -30

            echo
            echo "===== app: ERROR log lines (last $WIN, most recent 80) ====="
            docker compose logs app --since "$WIN" 2>&1 | grep -E "ERROR" | tail -80

            echo
            echo "===== app: full stacktraces — ERROR + following ' at ...' frames (last $WIN, tail 250) ====="
            docker compose logs app -t --since "$WIN" 2>&1 \
              | grep -E "ERROR|Exception|Caused by:|^[[:space:]]+at |\.\.\. [0-9]+ (more|common frames)" \
              | tail -250

            echo
            echo "===== nginx: 5xx status histogram (last $WIN) ====="
            docker compose logs nginx --since "$WIN" 2>&1 \
              | grep -oE '" (5[0-9][0-9]) ' | sort | uniq -c | sort -rn

            echo
            echo "===== nginx: which paths are 5xx-ing (last $WIN, top 40 by path) ====="
            docker compose logs nginx --since "$WIN" 2>&1 \
              | awk '$9 ~ /^5[0-9][0-9]$/ {print $9, $7}' | sort | uniq -c | sort -rn | head -40

            echo
            echo "===== nginx: recent 5xx access lines (last $WIN, tail 60) ====="
            docker compose logs nginx --since "$WIN" 2>&1 | awk '$9 ~ /^5[0-9][0-9]$/' | tail -60

            echo
            echo "===== app: startup/health hints (OOM, Flyway, datasource, bind) ====="
            docker compose logs app --since "$WIN" 2>&1 \
              | grep -iE "OutOfMemory|Flyway|HikariPool|Communications link failure|Connection refused|Started .* in [0-9]|APPLICATION FAILED TO START|bind" | tail -40

            echo "===== done ====="
