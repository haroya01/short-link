# लिंक इनसाइट संदेश (हिन्दी) — मशीन ड्राफ़्ट, समीक्षा प्रतीक्षित।
insight.PEAK_HOUR=पीक समय {0} {1}:00 बजे है (कुल का {2}%)
insight.TOP_CHANNEL={0}% ट्रैफ़िक {1} से आता है
insight.COUNTRY_CONCENTRATION={0}% क्लिक {1} से — वैश्विक पहुँच कम
insight.VISITOR_MIX={0}% विज़िटर पहली बार आए
insight.BOT_RATIO_HIGH=बॉट ट्रैफ़िक असामान्य रूप से {0}% पर
insight.FAST_DECAY=तेज़ गिरावट — पहले दिन में {0}% खर्च
insight.WEEK_OVER_WEEK=पिछले 7 दिनों में क्लिक {0}% (पिछले 7 की तुलना में)
insight.DARK_SOCIAL=डायरेक्ट शेयर (डार्क सोशल) {0}% — DM और कॉपी-पेस्ट से फैला
insight.SECOND_WIND=फिर सक्रिय — शांत लिंक को हाल ही में {0} क्लिक मिले
insight.DORMANT={0} दिनों से कोई क्लिक नहीं — दोबारा शेयर करने से सक्रिय हो सकता है
insight.CHANNEL_JUMP={0} से शुरू हुआ पर {1} तक फैला — अपने मूल दर्शकों से आगे निकल गया

