# 링크 인사이트 메시지 (한국어). 인자는 LinkInsights 에서 미리 포맷한 문자열.
insight.PEAK_HOUR=피크 시간은 {0} {1}시 (전체의 {2}%)
insight.TOP_CHANNEL=트래픽의 {0}%가 {1}에서 발생
insight.COUNTRY_CONCENTRATION=클릭의 {0}%가 {1}에서 발생, 글로벌 도달이 낮음
insight.VISITOR_MIX=방문자 {0}%가 첫 방문
insight.BOT_RATIO_HIGH=봇 트래픽이 {0}%로 비정상적으로 높음
insight.FAST_DECAY=빠른 소멸형 (1일 이내 {0}% 소진)
insight.WEEK_OVER_WEEK=지난 7일 클릭 {0}% (전 7일 대비)
insight.DARK_SOCIAL=직접 공유(다크소셜)가 {0}% — DM·복붙으로 퍼졌어요
insight.SECOND_WIND=다시 살아났어요 — 잠잠하던 링크가 최근 {0}클릭
insight.DORMANT={0}일째 클릭이 없어요 — 다시 공유하면 살아날 수 있어요
insight.CHANNEL_JUMP={0}에서 시작했는데 {1}로 퍼졌어요 — 원래 청중 밖으로 넘어갔어요

dayOfWeek.MONDAY=월요일
dayOfWeek.TUESDAY=화요일
dayOfWeek.WEDNESDAY=수요일
dayOfWeek.THURSDAY=목요일
dayOfWeek.FRIDAY=금요일
dayOfWeek.SATURDAY=토요일
dayOfWeek.SUNDAY=일요일
