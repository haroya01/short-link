spring:
  application:
    name: short-link
  cache:
    type: redis
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid, profile, email

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 16KB
    max-swallow-size: 16KB
  max-http-request-header-size: 8KB

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

short-link:
  base-url: ${SHORT_LINK_BASE_URL:http://localhost:8080}
  rate-limit:
    anonymous: 100
    authenticated: 1000
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    access-ttl: 15m
    refresh-ttl: 14d
  cookie:
    secure: ${COOKIE_SECURE:false}
  safe-browsing:
    enabled: ${SAFE_BROWSING_ENABLED:true}
    api-key: ${SAFE_BROWSING_API_KEY:}
    cache-ttl: 1h
    timeout: 2s
