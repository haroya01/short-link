spring:
  application:
    name: short-link
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cache:
    type: redis
  jpa:
    # open-session-in-view 를 끈다. 기본값(true)이면 EntityManager 와 그것이 잡은 JDBC 커넥션이
    # 요청 스레드에 요청 끝까지 묶인다 — 보통 요청은 밀리초라 문제없지만, /api/v1/links/{code}/stream
    # SSE 는 최대 5분 살아 있는 async 요청이라 lookup 한 번에 잡힌 커넥션을 그 5분 내내 쥔다.
    # 열린 스트림 하나가 풀 커넥션 하나를 점유 → 동시 대시보드가 풀(20)을 통째로 굶긴다(2026-06-22 인시던트).
    # 끄면 각 @Transactional 조회가 커넥션을 즉시 반납하고, 긴 async 구간은 커넥션을 0개 쥔다.
    # (컨트롤러는 엔티티가 아닌 DTO 를 반환하므로 뷰 렌더링 중 lazy 로딩이 없어 안전하다.)
    open-in-view: false
    properties:
      hibernate:
        # Emit a WARN log for any SQL query that takes longer than the threshold (ms). 500ms is a
        # conservative starting point — tune via env var once we have baseline data. WARN level
        # routes into the admin "recent errors" pane so slow queries surface alongside errors.
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: ${SLOW_QUERY_THRESHOLD_MS:500}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid, profile, email

server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 16KB
    max-swallow-size: 16KB
  max-http-request-header-size: 8KB

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        redirect.latency: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        redirect.latency: 0.5, 0.95, 0.99

short-link:
  avatar:
    bucket: ${AVATAR_S3_BUCKET:}
    region: ${AVATAR_S3_REGION:ap-northeast-2}
    public-base-url: ${AVATAR_S3_PUBLIC_BASE_URL:}
    presign-ttl-seconds: ${AVATAR_PRESIGN_TTL:300}
    max-bytes: ${AVATAR_MAX_BYTES:5242880}
  pow:
    difficulty: ${POW_DIFFICULTY:3}
    enforce: ${POW_ENFORCE:true}
  twofa:
    aes-key: ${TWOFA_AES_KEY:}
    issuer: ${TWOFA_ISSUER:kurl.me}
  base-url: ${SHORT_LINK_BASE_URL:http://localhost:8080}
  frontend-base-url: ${SHORT_LINK_FRONTEND_BASE_URL:http://localhost:3001}
  mobile:
    redirect-uri: ${MOBILE_REDIRECT_URI:kurl://auth}
  apple:
    issuer: ${APPLE_SIGNIN_ISSUER:https://appleid.apple.com}
    jwk-set-uri: ${APPLE_SIGNIN_JWKS:https://appleid.apple.com/auth/keys}
    client-ids: ${APPLE_SIGNIN_CLIENT_IDS:focustime.kurl}
  rate-limit:
    anonymous: 100
    authenticated: 1000
  link-quota:
    authenticated: ${LINK_QUOTA_AUTHENTICATED:200}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001}
  cleanup:
    enabled: ${CLEANUP_ENABLED:true}
    cron: ${CLEANUP_CRON:0 0 4 * * *}
    expired-grace-days: ${CLEANUP_GRACE_DAYS:30}
  og-fetch:
    max-attempts: ${OG_FETCH_MAX_ATTEMPTS:3}
    retry-cron: ${OG_FETCH_RETRY_CRON:0 30 4 * * *}
    stale-after-days: ${OG_REFRESH_STALE_DAYS:30}
    refresh-cron: ${OG_REFRESH_CRON:0 0 5 * * SUN}
    refresh-enabled: ${OG_REFRESH_ENABLED:true}
  audit-log:
    retention-days: ${AUDIT_LOG_RETENTION_DAYS:180}
    cleanup-cron: ${AUDIT_LOG_CLEANUP_CRON:0 45 4 * * *}
    cleanup-enabled: ${AUDIT_LOG_CLEANUP_ENABLED:true}
  user-deletion:
    grace-days: ${USER_DELETION_GRACE_DAYS:30}
    cleanup-cron: ${USER_DELETION_CLEANUP_CRON:0 30 5 * * *}
    cleanup-enabled: ${USER_DELETION_CLEANUP_ENABLED:true}
  campaign:
    lifecycle-cron: ${CAMPAIGN_LIFECYCLE_CRON:0 * * * * *}
    lifecycle-enabled: ${CAMPAIGN_LIFECYCLE_ENABLED:true}
  geoip:
    license-key: ${MAXMIND_LICENSE_KEY:}
    download-url: ${GEOIP_DOWNLOAD_URL:}
    refresh-cron: ${GEOIP_REFRESH_CRON:0 15 5 * * WED}
    refresh-enabled: ${GEOIP_REFRESH_ENABLED:true}
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    access-ttl: 15m
    refresh-ttl: 14d
    refresh-rotation-grace: 60s
  cookie:
    secure: ${COOKIE_SECURE:false}
    domain: ${COOKIE_DOMAIN:}
    same-site: ${COOKIE_SAME_SITE:Strict}
  bootstrap-admin-email: ${SHORT_LINK_BOOTSTRAP_ADMIN_EMAIL:}
  safe-browsing:
    enabled: ${SAFE_BROWSING_ENABLED:true}
    api-key: ${SAFE_BROWSING_API_KEY:}
    cache-ttl: 1h
    timeout: 2s
  bot-heuristic:
    rate-threshold: ${BOT_HEURISTIC_RATE_THRESHOLD:5}
  # Derived from the frontend base by default — public profile pages live on the SPA host
  # (app.kurl.me), not the redirect host (kurl.me).
  public-profile-base-url: ${PUBLIC_PROFILE_BASE_URL:${SHORT_LINK_FRONTEND_BASE_URL:http://localhost:3001}/u/}
  stripe:
    api-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    price-pro: ${STRIPE_PRICE_PRO:}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:3001/ko/settings#data}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3001/ko/pricing}
    portal-return-url: ${STRIPE_PORTAL_RETURN_URL:http://localhost:3001/ko/settings#data}
