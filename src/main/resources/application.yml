spring:
  application:
    name: short-link
  cache:
    type: redis
    redis:
      time-to-live: 24h

server:
  port: 8080

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid, profile, email

short-link:
  base-url: ${SHORT_LINK_BASE_URL:http://localhost:8080}
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}
    access-ttl: 15m
    refresh-ttl: 14d
  cookie:
    secure: ${COOKIE_SECURE:false}
