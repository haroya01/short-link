spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

server:
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:prod}
  release: ${SENTRY_RELEASE:}
  traces-sample-rate: 0.1
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

short-link:
  base-url: ${SHORT_LINK_BASE_URL}
  jwt:
    private-key: ${JWT_PRIVATE_KEY}
    public-key: ${JWT_PUBLIC_KEY}
  cookie:
    secure: true
    domain: ${COOKIE_DOMAIN:.kurl.me}
    same-site: ${COOKIE_SAME_SITE:Lax}
  # Credentialed (refresh-cookie) requests come from EVERY platform surface, not just the apex:
  # the apex (kurl.me), the blog (blog.kurl.me) AND each author subdomain ({username}.kurl.me).
  # Listing only the apex is why the blog/subdomain sessions silently dropped — the credentialed
  # /api/v1/auth/refresh preflight was blocked there, so bootstrapSession couldn't restore the token.
  # `https://*.kurl.me` is an allowed-origin PATTERN (CorsConfiguration#setAllowedOriginPatterns) that
  # covers blog + every author subdomain; the apex needs its own entry (the wildcard won't match it).
  # Env still wins — but when set, CORS_ALLOWED_ORIGINS MUST include both of these.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://kurl.me,https://*.kurl.me}
