# Link insight messages (default = English). Args are pre-formatted strings from LinkInsights.
# {0}.. positional. Percent values arrive without the % sign; the % is literal in the template.
insight.PEAK_HOUR=Peak time is {0} at {1}:00 ({2}% of all clicks)
insight.TOP_CHANNEL={0}% of traffic comes from {1}
insight.COUNTRY_CONCENTRATION={0}% of clicks are from {1} — low global reach
insight.VISITOR_MIX={0}% of visitors are first-timers
insight.BOT_RATIO_HIGH=Bot traffic is unusually high at {0}%
insight.FAST_DECAY=Fast decay — {0}% spent within day 1
insight.WEEK_OVER_WEEK=Clicks {0}% over the last 7 days (vs the prior 7)
insight.DARK_SOCIAL=Direct shares (dark social) {0}% — spread via DMs and copy-paste
insight.SECOND_WIND=Back to life — a quiet link got {0} clicks recently
insight.DORMANT=No clicks for {0} days — resharing could revive it
insight.CHANNEL_JUMP=Started on {0} but spread to {1} — it jumped beyond its original audience

dayOfWeek.MONDAY=Monday
dayOfWeek.TUESDAY=Tuesday
dayOfWeek.WEDNESDAY=Wednesday
dayOfWeek.THURSDAY=Thursday
dayOfWeek.FRIDAY=Friday
dayOfWeek.SATURDAY=Saturday
dayOfWeek.SUNDAY=Sunday

# Push notification bodies (default = English). {0} = actor username.
notification.push.LIKE={0} liked your post
notification.push.COMMENT={0} commented on your post
notification.push.REPLY={0} replied to you
notification.push.FOLLOW={0} started following you
notification.push.SERIES_SUBSCRIBE={0} subscribed to your series
notification.push.NEW_POST={0} published a new post
notification.push.MENTION={0} mentioned you
notification.push.CONNECTED={0} connected your work into a collection
notification.push.PATH_GREW={0} added to a collection you're part of
