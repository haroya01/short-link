# kurl.me — backend (Spring Boot) origin.
# Frontend lives on app.kurl.me (Vercel) and calls this host directly.
# Apex routes:
#   /                       → backend redirects to https://app.kurl.me/
#   /{shortCode}            → backend issues 302 to the destination URL
#   /api/v1/*               → backend REST + SSE (live click stream)
#   /oauth2/* /login/oauth2 → Spring Security OAuth2 client flow
#   /actuator/*             → blocked at the edge
#
# origin.kurl.me — Cloudflare Worker 가 backend 를 직접 호출하는 hostname.
# Worker route 는 kurl.me/* 에 바인딩돼 있어 origin.kurl.me 로 fetch 해야 자기 자신을
# 다시 호출하는 루프가 안 생긴다. 같은 server block 으로 받아 동일한 라우팅 처리.

server {
    listen 80;
    listen [::]:80;
    server_name kurl.me www.kurl.me origin.kurl.me;

    # Let's Encrypt http-01 challenges land here via the certbot-www shared volume.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Canonicalise www → apex on HTTPS.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.kurl.me;
    ssl_certificate     /etc/letsencrypt/live/kurl.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurl.me/privkey.pem;
    return 301 https://kurl.me$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kurl.me origin.kurl.me;

    ssl_certificate     /etc/letsencrypt/live/kurl.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurl.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restore the real visitor IP from Cloudflare. Traffic arrives via the CF Worker, so without
    # this nginx's $remote_addr (and the X-Real-IP / X-Forwarded-For it forwards) is a Cloudflare
    # edge IP — every click then resolves to a Cloudflare datacenter ASN, gets flagged bot=true,
    # and is dropped from all stats. Trust CF-Connecting-IP ONLY from Cloudflare's published ranges
    # so the header can't be forged by a direct-to-origin caller. Ranges: https://www.cloudflare.com/ips
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Block external traffic to actuator.
    location /actuator/ {
        deny all;
        return 403;
    }

    # SSE endpoint: chunked, long-lived, no proxy buffering.
    location ~ ^/api/v1/links/[^/]+/stream$ {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 1h;
    }

    location / {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        client_max_body_size 16m;
    }
}
